<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Futebol CC — San Jose Quakes Draft 2026</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Inter+Tight:wght@700;800;900&display=swap');
:root {
  --blue:#1a6dba; --blue-lt:#4a9eff; --blue-dark:#0d4a82;
  --red:#c0392b; --green:#48bb78;
  --bg:#070b14; --bg2:#0d1220; --bg3:#111827; --bg4:#1a2035;
  --border:#1e2d45; --border2:#2d3748;
  --text:#e2e8f0; --muted:#64748b; --dim:#2d3748;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;display:flex;flex-direction:column;}

/* ── LOGIN ── */
.login-overlay{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;}
.login-box{background:var(--bg3);border:1px solid var(--border2);border-radius:20px;padding:40px 36px;width:100%;max-width:360px;display:flex;flex-direction:column;align-items:center;gap:24px;box-shadow:0 24px 64px rgba(0,0,0,.8);}
.login-logo{height:90px;filter:drop-shadow(0 0 16px rgba(26,109,186,.5));}
.login-title{font-family:'Inter Tight',sans-serif;font-size:22px;font-weight:900;text-transform:uppercase;letter-spacing:3px;color:#fff;text-align:center;line-height:1.2;}
.login-sub{font-size:12px;color:var(--muted);text-align:center;margin-top:6px;letter-spacing:1px;}
.login-field{width:100%;position:relative;}
.login-input{width:100%;background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:14px 48px 14px 16px;color:var(--text);font-size:16px;font-family:'Inter',sans-serif;outline:none;transition:border-color .2s;letter-spacing:2px;}
.login-input:focus{border-color:var(--blue);}
.login-input.error{border-color:#fc8181;animation:shake .3s;}
.login-eye{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);font-size:18px;line-height:1;padding:4px;transition:color .15s;}
.login-eye:hover{color:var(--text);}
.login-btn{width:100%;padding:14px;border:none;border-radius:10px;background:linear-gradient(135deg,var(--blue),var(--blue-dark));color:#fff;font-family:'Inter Tight',sans-serif;font-size:16px;font-weight:800;letter-spacing:2px;cursor:pointer;transition:all .2s;text-transform:uppercase;touch-action:manipulation;}
.login-btn:hover{box-shadow:0 0 20px rgba(26,109,186,.5);transform:translateY(-1px);}
.login-error{font-size:12px;color:#fc8181;text-align:center;min-height:16px;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}

/* ── HEADER ── */
.header{flex-shrink:0;background:linear-gradient(180deg,#040810,#070c18);border-bottom:2px solid var(--blue);padding:10px 20px;display:flex;align-items:center;gap:14px;z-index:200;box-shadow:0 4px 24px rgba(0,0,0,.7);}
.logo{height:56px;filter:drop-shadow(0 0 10px rgba(26,109,186,.5));flex-shrink:0;}
.header-text{flex:1;min-width:0;}
.header-title{font-family:'Inter Tight',sans-serif;font-size:22px;font-weight:900;text-transform:uppercase;letter-spacing:3px;color:#fff;line-height:1;}
.header-sub{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:2px;}
.header-stats{display:flex;gap:16px;flex-shrink:0;}
.hstat{text-align:center;font-family:'Inter Tight',sans-serif;}
.hstat-val{font-size:24px;font-weight:900;color:var(--blue);line-height:1;}
.hstat-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}

/* ── FILTER BAR ── */
.filter-bar{flex-shrink:0;background:var(--bg2);border-bottom:1px solid var(--border);padding:7px 20px;display:flex;align-items:center;gap:10px;z-index:199;}
.filter-label{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;white-space:nowrap;flex-shrink:0;}
.filter-chips{display:flex;gap:6px;flex-wrap:wrap;}
.chip{font-family:'Inter Tight',sans-serif;font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px;cursor:pointer;border:1px solid var(--border2);background:var(--bg3);color:var(--muted);transition:all .18s;user-select:none;letter-spacing:.5px;}
.chip:hover{border-color:var(--blue-lt);color:var(--text);}
.chip.active{background:var(--blue);border-color:var(--blue);color:#fff;box-shadow:0 0 10px rgba(26,109,186,.4);}
.chip-clear{font-size:11px;padding:4px 10px;background:none;border:1px dashed var(--border2);}
.chip-clear:hover{color:#fc8181;border-color:#fc8181;}
.filter-note{font-size:10px;color:var(--muted);margin-left:auto;font-style:italic;white-space:nowrap;}

/* ── DESKTOP BOARD ── */
.board{flex:1;display:flex;gap:12px;padding:14px;overflow-x:auto;overflow-y:hidden;align-items:stretch;min-height:0;}
.column{flex:1;min-width:200px;background:var(--bg3);border-radius:14px;border:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.col-header{flex-shrink:0;padding:14px 14px 12px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,var(--bg2),var(--bg3));position:relative;text-align:center;z-index:10;}
.col-header::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--blue);}
.col-header.goleiros::before{background:linear-gradient(90deg,var(--red),#e74c3c);}
.col-title{font-family:'Inter Tight',sans-serif;font-size:22px;font-weight:900;text-transform:uppercase;letter-spacing:3px;color:#fff;}
.col-badge{display:inline-block;margin-top:4px;font-size:10px;font-weight:700;background:rgba(26,109,186,.25);color:var(--blue);border:1px solid rgba(26,109,186,.4);border-radius:20px;padding:2px 10px;}
.col-badge.g{background:rgba(192,57,43,.2);color:#e87060;border-color:rgba(192,57,43,.4);}
.cards-list{flex:1;overflow-y:auto;padding:8px 7px;display:flex;flex-direction:column;gap:0;min-height:0;}
.cards-list::-webkit-scrollbar{width:4px;}
.cards-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}

/* ── CARD ROW ── */
.card-row{display:flex;align-items:center;gap:5px;padding:3px 0;}
.row-num{font-family:'Inter Tight',sans-serif;font-size:17px;font-weight:700;color:var(--muted);min-width:26px;text-align:center;flex-shrink:0;user-select:none;}

/* ── CARD (layout via inline styles in JS) ── */
.card{flex:1;background:var(--bg4);border:1px solid var(--border2);border-radius:10px;padding:9px;cursor:pointer;user-select:none;transition:border-color .2s,transform .15s,box-shadow .2s,opacity .3s,filter .3s,background .3s;}
.card:hover{border-color:var(--blue);transform:translateY(-2px);box-shadow:0 6px 20px rgba(26,109,186,.2);}
.card.dragging{opacity:.35;cursor:grabbing;transform:none;box-shadow:none;}
.card.dimmed{background:var(--bg2);border-color:var(--border);opacity:.35;filter:grayscale(.7) brightness(.65);}
.card.dimmed:hover{opacity:.48;transform:none;box-shadow:none;}
.card.not-found{border-style:dashed;background:var(--bg2);border-color:var(--dim);}
.card.filtered-out{display:none;}
.card-pos-label{font-family:'Inter Tight',sans-serif;font-size:10px;font-weight:800;color:var(--blue-lt);text-align:center;letter-spacing:.5px;text-transform:uppercase;line-height:1;}
.card-name{font-family:'Inter Tight',sans-serif;font-size:13px;font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:.3px;white-space:nowrap;overflow:hidden;}
.not-found .card-name{color:var(--muted);font-style:italic;text-transform:none;}
.card-stats{display:flex;flex-wrap:wrap;gap:3px;}
.stat{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:5px;padding:4px 5px;display:flex;flex-direction:column;align-items:center;min-width:30px;}
.stat-top{display:flex;align-items:center;gap:2px;font-size:10px;color:var(--muted);white-space:nowrap;}
.stat-val{color:var(--text);font-weight:700;font-size:11px;}
.stat-pct{font-size:9px;font-weight:600;color:var(--blue-lt);margin-top:1px;line-height:1;}
.stat-not-found{color:var(--dim);font-size:10px;font-style:italic;}
.card-actions{display:flex;flex-direction:column;gap:4px;flex-shrink:0;}
.btn-icon{background:none;border:none;cursor:pointer;padding:3px;border-radius:5px;font-size:13px;line-height:1;transition:background .15s,color .15s;display:flex;align-items:center;justify-content:center;}
.btn-trash{color:#374151;}
.btn-trash:hover{background:rgba(252,129,129,.12);color:#fc8181;}
.btn-restore{color:var(--dim);display:none;}
.btn-restore:hover{background:rgba(72,187,120,.12);color:#68d391;}
.card.dimmed .btn-trash{display:none;}
.card.dimmed .btn-restore{display:flex;}
.drop-indicator{height:3px;background:var(--blue);border-radius:2px;margin:2px 4px;display:none;box-shadow:0 0 8px rgba(26,109,186,.6);}
.drop-indicator.visible{display:block;}

/* ── UP/DOWN BUTTONS ── */
.updown-btns{display:none;flex-direction:column;gap:3px;flex-shrink:0;align-self:center;}
.updown-btns button{background:var(--bg2);border:1px solid var(--border2);border-radius:6px;color:var(--muted);font-size:14px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s,color .15s,border-color .15s;line-height:1;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
.updown-btns button:active{background:var(--blue);border-color:var(--blue);color:#fff;}
.updown-btns button:disabled{opacity:.25;pointer-events:none;}

/* ── LIGHTBOX ── */
.lightbox{position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,.88);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;cursor:zoom-out;}
.lightbox.open{opacity:1;pointer-events:all;}
.lightbox img{max-width:min(90vw,480px);max-height:80vh;border-radius:50%;object-fit:cover;border:4px solid var(--blue);box-shadow:0 0 60px rgba(26,109,186,.5);transform:scale(.85);transition:transform .25s cubic-bezier(.34,1.56,.64,1);}
.lightbox.open img{transform:scale(1);}
.lightbox-name{position:absolute;bottom:12%;left:50%;transform:translateX(-50%);font-family:'Inter Tight',sans-serif;font-size:18px;font-weight:800;color:#fff;letter-spacing:2px;text-transform:uppercase;text-shadow:0 2px 12px rgba(0,0,0,.8);opacity:0;transition:opacity .3s .1s;}
.lightbox.open .lightbox-name{opacity:1;}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;z-index:1000;background:rgba(4,8,16,.85);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;pointer-events:none;transition:opacity .2s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--bg3);border:1px solid var(--border2);border-radius:18px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;overflow-x:hidden;box-shadow:0 24px 64px rgba(0,0,0,.8);transform:translateY(12px);transition:transform .22s;display:flex;flex-direction:column;}
.modal-overlay.open .modal{transform:translateY(0);}
.modal::-webkit-scrollbar{width:4px;}
.modal::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
.modal-head{flex-shrink:0;padding:20px 16px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;position:sticky;top:0;background:var(--bg3);z-index:5;border-radius:18px 18px 0 0;width:100%;}
.modal-photo-wrap{position:relative;flex-shrink:0;}
.modal-photo{width:72px;height:72px;border-radius:50%;object-fit:cover;border:3px solid var(--blue);background:var(--bg2);display:block;cursor:zoom-in;}
.modal-photo-btn{position:absolute;bottom:0;right:0;width:24px;height:24px;border-radius:50%;background:var(--blue);border:2px solid var(--bg3);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;transition:background .15s;}
.modal-photo-btn:hover{background:var(--blue-lt);}
#modal-photo-input{display:none;}
.modal-head-info{flex:1;min-width:0;}
.modal-name{font-family:'Inter Tight',sans-serif;font-size:18px;font-weight:900;text-transform:uppercase;letter-spacing:1px;color:#fff;line-height:1.2;}
.modal-kit{font-size:11px;color:var(--muted);margin-top:3px;font-weight:600;text-transform:uppercase;letter-spacing:1px;}
.modal-close{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;padding:4px;border-radius:6px;line-height:1;flex-shrink:0;transition:color .15s,background .15s;}
.modal-close:hover{color:var(--text);background:var(--bg4);}
.modal-body{padding:0 16px 20px;display:flex;flex-direction:column;gap:20px;margin-top:18px;width:100%;}
.modal-section{display:flex;flex-direction:column;gap:10px;width:100%;}
.section-title{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:2px;display:flex;align-items:center;gap:8px;}
.section-title::after{content:'';flex:1;height:1px;background:var(--border);}
.pos-chips{display:flex;gap:8px;flex-wrap:wrap;}
.pos-chip{font-family:'Inter Tight',sans-serif;font-size:13px;font-weight:700;letter-spacing:.5px;padding:6px 16px;border-radius:8px;cursor:pointer;border:1px solid var(--border2);background:var(--bg4);color:var(--muted);transition:all .18s;user-select:none;touch-action:manipulation;}
.pos-chip:hover{border-color:var(--blue-lt);color:var(--text);}
.pos-chip.sel{background:linear-gradient(135deg,var(--blue),var(--blue-dark));border-color:var(--blue);color:#fff;box-shadow:0 0 12px rgba(26,109,186,.35);}
.photo-url-row{display:flex;gap:8px;align-items:center;width:100%;min-width:0;}
.modal-input{flex:1;min-width:0;background:var(--bg2);border:1px solid var(--border2);border-radius:8px;padding:8px 10px;color:var(--text);font-size:12px;font-family:'Inter',sans-serif;transition:border-color .18s;outline:none;width:100%;}
.modal-input:focus{border-color:var(--blue);}
.modal-input::placeholder{color:var(--dim);}
.btn-sm{flex-shrink:0;padding:7px 14px;border-radius:8px;border:none;font-family:'Inter Tight',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .18s;letter-spacing:.5px;white-space:nowrap;touch-action:manipulation;}
.btn-blue{background:var(--blue);color:#fff;}
.btn-blue:hover{background:var(--blue-lt);}
.btn-outline{background:transparent;border:1px solid var(--border2);color:var(--muted);}
.btn-outline:hover{border-color:var(--blue-lt);color:var(--text);}
.stats-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;width:100%;}
.stat-field{display:flex;flex-direction:column;gap:5px;min-width:0;}
.stat-field label{font-size:9px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;display:flex;align-items:center;gap:4px;white-space:nowrap;}
.stat-field .modal-input{text-align:center;font-size:14px;font-weight:700;padding:8px 4px;width:100%;}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0;}
input[type=number]{-moz-appearance:textfield;}
.modal-footer{flex-shrink:0;padding:14px 16px 20px;display:flex;gap:10px;border-top:1px solid var(--border);position:sticky;bottom:0;background:var(--bg3);border-radius:0 0 18px 18px;}
.btn-save{flex:1;padding:11px;border-radius:10px;border:none;background:linear-gradient(135deg,#48bb78,#2f855a);color:#fff;font-family:'Inter Tight',sans-serif;font-size:15px;font-weight:800;cursor:pointer;transition:all .18s;letter-spacing:1px;touch-action:manipulation;}
.btn-save:hover{box-shadow:0 0 16px rgba(72,187,120,.4);transform:translateY(-1px);}
.btn-cancel{padding:11px 18px;border-radius:10px;border:1px solid var(--border2);background:transparent;color:var(--muted);font-family:'Inter Tight',sans-serif;font-size:14px;cursor:pointer;transition:all .18s;touch-action:manipulation;}
.btn-cancel:hover{border-color:#fc8181;color:#fc8181;}

/* ── TD INDICATOR ── */
#td-indicator{position:fixed;height:3px;z-index:9999;pointer-events:none;background:var(--blue);box-shadow:0 0 8px rgba(26,109,186,.8);border-radius:2px;display:none;left:0;right:0;}

/* ── MOBILE ── */
@media(max-width:767px){
  .header{padding:8px 12px;gap:10px;}
  .logo{height:42px;}
  .header-title{font-size:16px;letter-spacing:1.5px;}
  .header-sub{font-size:9px;}
  .header-stats{gap:10px;}
  .hstat-val{font-size:18px;}
  .hstat-lbl{font-size:8px;}
  .filter-bar{padding:6px 12px;gap:6px;overflow-x:auto;flex-wrap:nowrap;scrollbar-width:none;justify-content:center;}
  .filter-bar::-webkit-scrollbar{display:none;}
  .filter-label{display:none;}
  .filter-note{display:none;}
  .chip{font-size:11px;padding:4px 10px;white-space:nowrap;}
  .board{display:none;}
  .mobile-shell{display:flex;flex-direction:column;flex:1;min-height:0;}
  .kit-tabs{flex-shrink:0;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;scrollbar-width:none;}
  .kit-tabs::-webkit-scrollbar{display:none;}
  .kit-tab{flex:1;min-width:64px;padding:10px 6px 8px;text-align:center;cursor:pointer;border-bottom:3px solid transparent;transition:all .18s;font-family:'Inter Tight',sans-serif;}
  .kit-tab-label{font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);display:block;}
  .kit-tab-count{display:none;}
  .kit-tab.active .kit-tab-label{color:#fff;}
  .kit-tab.active{border-bottom-color:var(--blue);background:rgba(26,109,186,.08);}
  .kit-tab.active.gol{border-bottom-color:var(--red);}
  .mobile-columns{flex:1;min-height:0;overflow:hidden;position:relative;width:100%;}
  .mobile-slider{display:flex;height:100%;will-change:transform;}
  .mobile-col{flex:0 0 100vw;width:100vw;height:100%;overflow-y:auto;padding:10px 10px 20px;display:flex;flex-direction:column;gap:0;}
  .card-row{padding:2px 0;gap:4px;}
  .row-num{font-size:14px;min-width:22px;}
  .card{padding:8px;}
  .updown-btns{display:flex;}
  .modal-overlay{padding:0;align-items:flex-end;}
  .modal{border-radius:20px 20px 0 0;max-height:92vh;max-width:100%;}
  .modal-head{border-radius:20px 20px 0 0;}
  .stats-grid{grid-template-columns:1fr 1fr 1fr;}
}
.mobile-shell{display:none;}
@media(min-width:768px){.mobile-shell{display:none;}}
</style>
</head>
<body>

<!-- LOGIN -->

<script>

/* ═══ LOGIN ═══ */
(function() {
  var PASS = '';
  var SESSION_KEY = 'sj_auth';
  var overlay = document.getElementById('login-overlay');
  var input   = document.getElementById('login-input');
  var btn     = document.getElementById('login-btn');
  var errEl   = document.getElementById('login-error');
  var eyeBtn  = document.getElementById('login-eye');
  function unlock() { overlay.style.display = 'none'; }
  function attempt() {
    if (input.value === PASS) { sessionStorage.setItem(SESSION_KEY,'1'); unlock(); }
    else {
      errEl.textContent = 'Senha incorreta.';
      input.classList.add('error');
      input.value = '';
      setTimeout(function(){ input.classList.remove('error'); }, 400);
      input.focus();
    }
  }
  if (sessionStorage.getItem(SESSION_KEY) === '1') { unlock(); return; }
  btn.addEventListener('click', attempt);
  input.addEventListener('keydown', function(e){ if(e.key==='Enter') attempt(); });
  eyeBtn.addEventListener('click', function(){
    input.type = input.type==='password' ? 'text' : 'password';
    eyeBtn.textContent = input.type==='password' ? '👁️' : '🙈';
  });
  input.focus();
})();

/* ═══ FIREBASE ═══ */
const _fbCfg = {
  apiKey:"AIzaSyCVwoTLqGIX0Dei4Bcp8XOqhMrCgVsV1UI",
  authDomain:"sj-quakes-draft.firebaseapp.com",
  projectId:"sj-quakes-draft",
  storageBucket:"sj-quakes-draft.firebasestorage.app",
  messagingSenderId:"662607965788",
  appId:"1:662607965788:web:09bd5894fdc94657474099"
};
let _db, _stateRef;
try {
  firebase.initializeApp(_fbCfg);
  _db = firebase.firestore();
  _stateRef = _db.collection('draft').doc('state');
} catch(e) {
  console.warn('[FB] Init error:', e);
}

function fbKey(str) {
  return str.normalize('NFD').replace(/[̀-ͯ]/g,'')
    .replace(/\s+/g,'_').replace(/[^a-zA-Z0-9_]/g,'');
}

let _fbTimer = null;
function fbSaveSoon() {
  clearTimeout(_fbTimer);
  _fbTimer = setTimeout(async () => { _fbTimer = null; await fbSave(); }, 900);
}

async function fbSave() {
  if (!_stateRef) { console.warn('[FB] Not initialized'); return; }
  try {
    const players = {};
    Object.entries(playerState).forEach(([name, s]) => {
      const d = { n:name, p:s.posicao||[], d:s.dimmed||false,
                  j:s.jogos, g:s.gols, a:s.assistencias, am:s.amarelos, v:s.vermelhos };
      if (s.foto) d.f = s.foto;
      players[fbKey(name)] = d;
    });
    const orders = {};
    KIT_ORDER.forEach(kit => {
      const list = desktopColumns[kit];
      if (list) {
        const names = [...list.querySelectorAll('.card[data-name]')].map(c=>c.dataset.name).filter(Boolean);
        if (names.length) orders[fbKey(kit)] = names;
      }
    });

    console.log('[FB] Saved OK');
  } catch(e) {

  }
}

function applyFbState(data) {
  if (!data) return;
  if (data.players) {
    Object.values(data.players).forEach(pd => {
      const name = pd.n;
      if (!playerState[name]) return;
      const s = playerState[name];
      if (pd.p && pd.p.length) s.posicao = pd.p;
      s.dimmed = pd.d || false;
      s.jogos = pd.j; s.gols = pd.g;
      s.assistencias = pd.a; s.amarelos = pd.am; s.vermelhos = pd.v;
      if (pd.f) s.foto = pd.f;
    });
    dimmedCount = Object.values(playerState).filter(s=>s.dimmed).length;
    const el = document.getElementById('stat-dimmed');
    if (el) el.textContent = dimmedCount;
  }
  // Determine order
  const orderMap = {};
  if (data.orders) {
    Object.entries(data.orders).forEach(([kk, names]) => {
      const kit = KIT_ORDER.find(k => fbKey(k) === kk);
      if (kit && names.length) orderMap[kit] = names;
    });
  }
  // Rebuild all lists
  Object.keys(cardEls).forEach(k => { cardEls[k] = []; });
  KIT_ORDER.forEach(kit => {
    const dList = desktopColumns[kit];
    const mList = mobileLists[kit];
    let kitPlayers = PLAYERS.filter(p => p.kit === kit);
    if (orderMap[kit]) {
      const orderedNames = orderMap[kit];
      kitPlayers = [
        ...orderedNames.map(n => kitPlayers.find(p => p.name === n)).filter(Boolean),
        ...kitPlayers.filter(p => !orderedNames.includes(p.name))
      ];
    }
    if (dList) { dList.innerHTML = ''; kitPlayers.forEach(p => dList.appendChild(buildCardEl(p))); updateNumbers(dList); }
    if (mList) { mList.innerHTML = ''; kitPlayers.forEach(p => mList.appendChild(buildCardEl(p))); updateNumbersAndButtons(mList); }
  });
  Object.entries(playerState).forEach(([name, s]) => {
    if (s.dimmed) (cardEls[name]||[]).forEach(c => c.classList.add('dimmed'));
  });
  applyFilters();
  fitNames();
}

function fbStart() {
  if (!_stateRef) { console.warn('[FB] Not initialized'); return; }
  console.log('[FB] Connecting to', _fbCfg.projectId);
  _stateRef.get().then(snap => {
    if (snap.exists) applyFbState(snap.data());
    _stateRef.onSnapshot(snap => {
      if (snap.metadata.hasPendingWrites || _fbTimer) return;
      applyFbState(snap.data());
    }, e => console.warn('[FB] Snapshot error:', e));
  }).catch(e => console.warn('[FB] Load error:', e));
}

const KIT_ORDER = ['KIT 4','KIT 3','GOLEIROS','KIT 2','KIT 1'];
const GOLEIROS_KIT = 'GOLEIROS';

/* player state */
const playerState = {};
PLAYERS.forEach(p => {
  playerState[p.name] = {
    posicao: p.posicao || [],
    foto: fixUrl(p.foto) || avatarUrl(p.name),
    jogos: p.jogos, gols: p.gols, assistencias: p.assistencias,
    amarelos: p.amarelos, vermelhos: p.vermelhos,
    encontrado: p.encontrado, kit: p.kit, dimmed: false
  };
});

function fixUrl(u) {
  if (!u) return '';
  u = u.replace(/https:\/\/futebolcc\.com\.brhttps:\/\//, 'https://');
  u = u.replace(/(futebolcc\.com\.br)([^/\s])/, '$1/$2');
  return u;
}
function avatarUrl(name) {
  return 'https://ui-avatars.com/api/?name=' + encodeURIComponent(name.toUpperCase()) + '&color=7F9CF5&background=EBF4FF&size=200';
}
function pctStr(val, jogos) {
  const v = parseFloat(val), j = parseFloat(jogos);
  if (isNaN(v)||isNaN(j)||j<=0) return '';
  return (v/j*100).toFixed(1)+'%';
}

/* ═══ FILTER ═══ */
let activeFilters = new Set();
let dimmedCount = 0;
let draggingCard = null, draggingColId = null;
let wasDragging = false;
let mobileKitIdx = 0;
const cardEls = {};
const desktopColumns = {};
const mobileLists = {};
let _drag = null;

function applyFilters() {
  document.querySelectorAll('.card[data-name]').forEach(card => {
    const kit = card.dataset.kit;
    if (kit === GOLEIROS_KIT || activeFilters.size === 0) { card.classList.remove('filtered-out'); return; }
    const posicao = playerState[card.dataset.name]?.posicao || [];
    card.classList.toggle('filtered-out', !posicao.some(p => activeFilters.has(p)));
  });
  document.querySelectorAll('.cards-list,.mobile-col').forEach(list => {
    let n = 1;
    list.querySelectorAll('.card-row').forEach(row => {
      const card = row.querySelector('.card');
      const hidden = card && card.classList.contains('filtered-out');
      row.style.display = hidden ? 'none' : '';
      const num = row.querySelector('.row-num');
      if (num && !hidden) num.textContent = n++;
    });
    const vis = [...list.querySelectorAll('.card-row')].filter(r => r.style.display !== 'none');
    vis.forEach((r, i) => {
      const btns = r.querySelectorAll('.updown-btns button');
      if (btns.length === 2) { btns[0].disabled=(i===0); btns[1].disabled=(i===vis.length-1); }
    });
  });
}

document.getElementById('filter-chips').addEventListener('click', e => {
  const chip = e.target.closest('.chip'); if (!chip) return;
  if (chip.id === 'chip-clear') {
    activeFilters.clear();
    document.querySelectorAll('.chip[data-pos]').forEach(c => c.classList.remove('active'));
    applyFilters(); return;
  }
  const pos = chip.dataset.pos;
  if (activeFilters.has(pos)) { activeFilters.delete(pos); chip.classList.remove('active'); }
  else { activeFilters.add(pos); chip.classList.add('active'); }
  applyFilters();
});

/* ═══ BUILD CARD ═══ */
function buildStatsHTML(name) {
  const s = playerState[name];
  if (s.encontrado !== 'SIM') return '<div class="stat-not-found">Não encontrado no sistema</div>';
  const j=s.jogos, g=s.gols, a=s.assistencias;
  const gv=parseFloat(g)||0, av=parseFloat(a)||0;
  const ga=(g!=='—'&&a!=='—')?(gv+av):null;
  const gaStr=ga!==null?ga:'—';
  return '<div class="card-stats">' +
    '<div class="stat"><div class="stat-top"><span>⚽</span><span class="stat-val">'+j+'</span><span>J</span></div></div>' +
    '<div class="stat"><div class="stat-top"><span class="stat-val">'+gaStr+'</span><span>G+A</span></div>'+(ga!==null&&pctStr(ga,j)?'<div class="stat-pct">'+pctStr(ga,j)+'</div>':'')+'</div>' +
    '<div class="stat"><div class="stat-top"><span>🎯</span><span class="stat-val">'+g+'</span></div>'+(pctStr(g,j)?'<div class="stat-pct">'+pctStr(g,j)+'</div>':'')+'</div>' +
    '<div class="stat"><div class="stat-top"><span>🅰️</span><span class="stat-val">'+a+'</span></div>'+(pctStr(a,j)?'<div class="stat-pct">'+pctStr(a,j)+'</div>':'')+'</div>' +
    '<div class="stat"><div class="stat-top"><span>🟡</span><span class="stat-val">'+s.amarelos+'</span></div></div>' +
    '<div class="stat"><div class="stat-top"><span>🔴</span><span class="stat-val">'+s.vermelhos+'</span></div></div>' +
    '</div>';
}

function buildCardEl(p) {
  const s = playerState[p.name];
  const found = p.encontrado === 'SIM';
  const isMob = window.innerWidth < 768;
  const pw = isMob ? 50 : 64; // photo size px

  const row = document.createElement('div');
  row.className = 'card-row';

  const numEl = document.createElement('div');
  numEl.className = 'row-num';

  // Up/down buttons
  const updown = document.createElement('div');
  updown.className = 'updown-btns';
  const btnUp = document.createElement('button'); btnUp.textContent = '▲';
  const btnDown = document.createElement('button'); btnDown.textContent = '▼';
  updown.appendChild(btnUp); updown.appendChild(btnDown);

  // Card
  const card = document.createElement('div');
  card.className = 'card' + (found ? '' : ' not-found');
  card.draggable = !isMob;
  card.dataset.name = p.name;
  card.dataset.kit = p.kit;
  card.style.display = 'flex';
  card.style.flexDirection = 'row';
  card.style.alignItems = 'stretch';
  card.style.gap = '8px';

  // LEFT: photo + position
  const left = document.createElement('div');
  left.style.cssText = 'display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;flex:0 0 auto;width:' + (pw + 8) + 'px;';

  const photoEl = makePhoto(s, p.name, pw, found);
  left.appendChild(photoEl);

  const posEl = document.createElement('span');
  posEl.className = 'cpl'; // card-pos-label
  posEl.style.cssText = 'font-size:10px;font-weight:800;color:var(--blue-lt);text-align:center;letter-spacing:.5px;text-transform:uppercase;line-height:1;font-family:Inter Tight,sans-serif;';
  posEl.textContent = (s.posicao||[]).join(' · ');
  if (posEl.textContent) left.appendChild(posEl);

  // RIGHT: name + stats
  const right = document.createElement('div');
  right.style.cssText = 'flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center;gap:5px;';

  const nameEl = document.createElement('div');
  nameEl.className = 'card-name';
  nameEl.textContent = p.name;
  right.appendChild(nameEl);

  const statsEl = document.createElement('div');
  statsEl.innerHTML = buildStatsHTML(p.name);
  right.appendChild(statsEl.firstChild || statsEl);

  // ACTIONS
  const actions = document.createElement('div');
  actions.className = 'card-actions';
  const btnTrash = document.createElement('button');
  btnTrash.className = 'btn-icon btn-trash'; btnTrash.title = 'Desativar'; btnTrash.textContent = '🗑️';
  const btnRestore = document.createElement('button');
  btnRestore.className = 'btn-icon btn-restore'; btnRestore.title = 'Restaurar'; btnRestore.textContent = '↩️';
  actions.appendChild(btnTrash); actions.appendChild(btnRestore);

  card.appendChild(left);
  card.appendChild(right);
  card.appendChild(actions);

  // Events
  btnTrash.addEventListener('click', e => {
    e.stopPropagation();
    playerState[p.name].dimmed = true;
    (cardEls[p.name]||[]).forEach(c => c.classList.add('dimmed'));
    dimmedCount++; document.getElementById('stat-dimmed').textContent = dimmedCount;
    fbSaveSoon();
  });
  btnRestore.addEventListener('click', e => {
    e.stopPropagation();
    playerState[p.name].dimmed = false;
    (cardEls[p.name]||[]).forEach(c => c.classList.remove('dimmed'));
    dimmedCount = Math.max(0, dimmedCount-1);
    document.getElementById('stat-dimmed').textContent = dimmedCount;
    fbSaveSoon();
  });
  card.addEventListener('click', e => {
    if (wasDragging || _modalJustClosed) return;
    if (e.target.closest('.btn-trash,.btn-restore,.updown-btns')) return;
    openModal(p.name);
  });
  card.addEventListener('dragstart', e => {
    wasDragging = false; draggingCard = row; draggingColId = p.kit;
    setTimeout(() => card.classList.add('dragging'), 0);
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', p.kit);
  });
  card.addEventListener('dragend', () => {
    card.classList.remove('dragging');
    draggingCard = null; draggingColId = null;
    wasDragging = true; setTimeout(() => wasDragging = false, 100);
    document.querySelectorAll('.drop-indicator').forEach(d => d.classList.remove('visible'));
  });

  if (!cardEls[p.name]) cardEls[p.name] = [];
  cardEls[p.name].push(card);
  attachPhotoZoom(photoEl, p.name);

  // Up/down handlers
  function moveCard(dir) {
    const list = row.parentElement; if (!list) return;
    const vis = [...list.querySelectorAll('.card-row')].filter(r => r.style.display !== 'none');
    const idx = vis.indexOf(row);
    if (dir === 'up' && idx > 0) list.insertBefore(row, vis[idx-1]);
    else if (dir === 'down' && idx < vis.length-1) { const after = vis[idx+2]; after ? list.insertBefore(row, after) : list.appendChild(row); }
    updateNumbersAndButtons(list);
    const dList = desktopColumns[p.kit];
    if (dList) {
      [...list.querySelectorAll('.card[data-name]')].map(c=>c.dataset.name).forEach(nm => {
        const dr = [...dList.querySelectorAll('.card-row')].find(r => r.querySelector('.card[data-name="'+nm+'"]'));
        if (dr) dList.appendChild(dr);
      });
      updateNumbers(dList);
    }
    fbSaveSoon();
  }
  btnUp.addEventListener('click', e => { e.stopPropagation(); moveCard('up'); });
  btnDown.addEventListener('click', e => { e.stopPropagation(); moveCard('down'); });

  row.appendChild(numEl);
  row.appendChild(updown);
  row.appendChild(card);
  return row;
}

// Helper: creates photo element (img or placeholder div) with fixed dimensions
function makePhoto(s, name, pw, found) {
  if (found && s.foto) {
    const img = document.createElement('img');
    img.className = 'card-photo';
    img.style.cssText = 'width:'+pw+'px;height:'+pw+'px;min-width:'+pw+'px;max-width:'+pw+'px;border-radius:50%;object-fit:cover;border:2px solid var(--border2);background:var(--bg3);display:block;flex-shrink:0;';
    img.src = s.foto;
    img.alt = name;
    img.addEventListener('error', () => { img.src = avatarUrl(name); });
    return img;
  } else {
    const div = document.createElement('div');
    const initials = name.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
    div.style.cssText = 'width:'+pw+'px;height:'+pw+'px;min-width:'+pw+'px;max-width:'+pw+'px;border-radius:50%;border:2px dashed var(--dim);background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:'+(pw*0.3|0)+'px;color:var(--muted);flex-shrink:0;box-sizing:border-box;';
    div.textContent = initials;
    return div;
  }
}


function refreshCard(card, name) {
  if (!card) return;
  const s = playerState[name];
  if (!s) return;
  const found = s.encontrado === 'SIM';
  const isMob = card.offsetWidth < 300;
  const pw = isMob ? 50 : 64;

  // Update left column
  const left = card.firstElementChild;
  if (left) {
    // Replace photo
    const oldPhoto = left.firstElementChild;
    if (oldPhoto) {
      const newPhoto = makePhoto(s, name, pw, found);
      left.replaceChild(newPhoto, oldPhoto);
      attachPhotoZoom(newPhoto, name);
    }
    // Update position label
    let posEl = left.querySelector('.cpl');
    const posText = (s.posicao||[]).join(' · ');
    if (posText) {
      if (!posEl) {
        posEl = document.createElement('span');
        posEl.className = 'cpl';
        posEl.style.cssText = 'font-size:10px;font-weight:800;color:var(--blue-lt);text-align:center;letter-spacing:.5px;text-transform:uppercase;line-height:1;font-family:Inter Tight,sans-serif;';
        left.appendChild(posEl);
      }
      posEl.textContent = posText;
    } else if (posEl) posEl.remove();
  }
  // Update stats (second child = right column)
  const right = card.children[1];
  if (right) {
    const oldStats = right.children[1];
    const tmp = document.createElement('div');
    tmp.innerHTML = buildStatsHTML(name);
    const newStats = tmp.firstChild;
    if (oldStats && newStats) right.replaceChild(newStats, oldStats);
    else if (newStats) right.appendChild(newStats);
  }
  fitNames();
}


/* ═══ DESKTOP COLUMNS ═══ */
const board = document.getElementById('board');
KIT_ORDER.forEach(kit => {
  const isGoal = kit === GOLEIROS_KIT;
  const count = PLAYERS.filter(p => p.kit === kit).length;
  const col = document.createElement('div');
  col.className = 'column'; col.dataset.kit = kit;
  col.innerHTML = '<div class="col-header '+(isGoal?'goleiros':'')+'"><div class="col-title">'+kit+'</div><span class="col-badge '+(isGoal?'g':'')+'">'+count+' atletas</span></div><div class="cards-list" id="dlist-'+kit.replace(/\s+/g,'_')+'"></div>';
  board.appendChild(col);
  const list = col.querySelector('.cards-list');
  desktopColumns[kit] = list;
  list.addEventListener('dragover', e => {
    if (draggingColId !== kit) return;
    e.preventDefault(); e.dataTransfer.dropEffect = 'move';
    const rows = [...list.querySelectorAll('.card-row')].filter(r=>r!==draggingCard&&r.style.display!=='none');
    let before = null;
    for (const r of rows) { if (e.clientY < r.getBoundingClientRect().top + r.getBoundingClientRect().height/2) { before=r; break; } }
    document.querySelectorAll('.drop-indicator').forEach(d=>d.classList.remove('visible'));
    let ind = before ? before.previousElementSibling : list.lastElementChild;
    if (!ind||!ind.classList.contains('drop-indicator')) { ind=document.createElement('div'); ind.className='drop-indicator'; before?list.insertBefore(ind,before):list.appendChild(ind); }
    ind.classList.add('visible');
  });
  list.addEventListener('dragleave', e => { if (!list.contains(e.relatedTarget)) document.querySelectorAll('.drop-indicator').forEach(d=>d.classList.remove('visible')); });
  list.addEventListener('drop', e => {
    if (draggingColId !== kit) return;
    e.preventDefault();
    document.querySelectorAll('.drop-indicator').forEach(d=>d.remove());
    const rows = [...list.querySelectorAll('.card-row')].filter(r=>r!==draggingCard&&r.style.display!=='none');
    let before = null;
    for (const r of rows) { if (e.clientY < r.getBoundingClientRect().top + r.getBoundingClientRect().height/2) { before=r; break; } }
    before ? list.insertBefore(draggingCard, before) : list.appendChild(draggingCard);
    updateNumbers(list); fbSaveSoon();
  });
});

/* ═══ MOBILE ═══ */
const kitTabs = document.getElementById('kit-tabs');
const mobileColsEl = document.getElementById('mobile-columns');
const mobileSlider = document.createElement('div');
mobileSlider.className = 'mobile-slider';
mobileColsEl.appendChild(mobileSlider);

KIT_ORDER.forEach((kit, idx) => {
  const isGoal = kit === GOLEIROS_KIT;
  const count = PLAYERS.filter(p=>p.kit===kit).length;
  const tab = document.createElement('div');
  tab.className = 'kit-tab'+(isGoal?' gol':'')+(idx===0?' active':'');
  tab.innerHTML = '<span class="kit-tab-label">'+kit+'</span><span class="kit-tab-count">'+count+' atletas</span>';
  tab.addEventListener('click', () => goToKit(idx));
  kitTabs.appendChild(tab);
  const col = document.createElement('div');
  col.className = 'mobile-col'; col.dataset.kit = kit;
  mobileSlider.appendChild(col);
  mobileLists[kit] = col;
});

function goToKit(idx) {
  mobileKitIdx = idx;
  mobileSlider.style.transition = 'transform .25s cubic-bezier(.4,0,.2,1)';
  mobileSlider.style.transform = 'translateX(calc(-'+idx+' * 100vw))';
  document.querySelectorAll('.kit-tab').forEach((t,i) => t.classList.toggle('active', i===idx));
}
let touchStartX=0, touchStartY=0, isSwiping=false;
mobileColsEl.addEventListener('touchstart', e => { if(_drag) return; touchStartX=e.touches[0].clientX; touchStartY=e.touches[0].clientY; isSwiping=false; }, {passive:true});
mobileColsEl.addEventListener('touchmove', e => {
  if (_drag) return;
  const dx=e.touches[0].clientX-touchStartX, dy=e.touches[0].clientY-touchStartY;
  if (!isSwiping&&Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>10) isSwiping=true;
  if (!isSwiping) return;
  e.preventDefault();
  mobileSlider.style.transition='none';
  mobileSlider.style.transform='translateX(calc(-'+mobileKitIdx+' * 100vw + '+dx+'px))';
}, {passive:false});
mobileColsEl.addEventListener('touchend', e => {
  if (!isSwiping) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const threshold = mobileColsEl.offsetWidth * 0.25;
  if (dx<-threshold&&mobileKitIdx<KIT_ORDER.length-1) goToKit(mobileKitIdx+1);
  else if (dx>threshold&&mobileKitIdx>0) goToKit(mobileKitIdx-1);
  else goToKit(mobileKitIdx);
  isSwiping=false;
}, {passive:true});

/* ═══ POPULATE ═══ */
function updateNumbers(list) {
  let n=1;
  list.querySelectorAll('.card-row').forEach(r => {
    const card=r.querySelector('.card');
    const hidden=card&&card.classList.contains('filtered-out');
    r.style.display=hidden?'none':'';
    const num=r.querySelector('.row-num');
    if(num&&!hidden) num.textContent=n++;
  });
}
function updateNumbersAndButtons(list) {
  updateNumbers(list);
  const vis=[...list.querySelectorAll('.card-row')].filter(r=>r.style.display!=='none');
  vis.forEach((r,i)=>{
    const btns=r.querySelectorAll('.updown-btns button');
    if(btns.length===2){btns[0].disabled=(i===0);btns[1].disabled=(i===vis.length-1);}
  });
}

KIT_ORDER.forEach(kit => {
  PLAYERS.filter(p=>p.kit===kit).forEach(p=>{
    desktopColumns[kit].appendChild(buildCardEl(p));
    mobileLists[kit].appendChild(buildCardEl(p));
  });
  updateNumbers(desktopColumns[kit]);
  updateNumbersAndButtons(mobileLists[kit]);
});

/* ═══ FIT NAMES ═══ */
function fitNames() {
  document.querySelectorAll('.card-name').forEach(el=>{
    el.style.fontSize='';
    let size=13;
    while(el.scrollWidth>el.offsetWidth&&size>7){size-=0.5;el.style.fontSize=size+'px';}
  });
}
requestAnimationFrame(()=>requestAnimationFrame(fitNames));
fbStart();
window.addEventListener('resize', fitNames);

/* Handle broken images */
document.addEventListener('error', function(e) {
  if (e.target.tagName === 'IMG' && e.target.dataset.fallback) {
    const name = e.target.alt;
    if (name) e.target.src = avatarUrl(name);
  }
}, true);


/* ═══ LIGHTBOX ═══ */
const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightbox-img');
const lightboxName = document.getElementById('lightbox-name');
function openLightbox(src, name) { lightboxImg.src=src; lightboxName.textContent=name; lightbox.classList.add('open'); }
lightbox.addEventListener('click', ()=>lightbox.classList.remove('open'));
document.addEventListener('keydown', e=>{if(e.key==='Escape')lightbox.classList.remove('open');});

function attachPhotoZoom(card, name) {
  const img = card.querySelector('.card-photo, img');
  if (!img) return;
  img.style.cursor='zoom-in';
  img.addEventListener('click', e=>{ e.stopPropagation(); openLightbox(img.src, name); });
}

</script>
